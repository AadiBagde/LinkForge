# Alembic Configuration
# This file contains the database migration settings

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# filename. The default value is 40 which results
# in the following 40 character filenames,
# %%(rev)s_%%(slug)s
# you might want to increase this for long branch
# names and even longer migration file names altogether
# filename_length =

# Compare type, default is False. With the default of
# False the sqlalchemy types are just stringified
# and compared "type IN ( boolean )TRUE or type IN (
# string/unicode ) FALSE" by default. Setting to
# True instructs to use the COMPARE_PARSERS to
# determine the highest affinity between types.
# compare_type = false

# Compare server default, default is False. Relying on just
# schema comparison of python bisect modules p recision may
# fail in cases such as mysql's boolean columns, which have a
# server precision of 1 or 0 in terms of python
# COMPARE_SERVER_DEFAULT is False, which disables the comparison
# of database DEFAULT for columns
# compare_server_default = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
